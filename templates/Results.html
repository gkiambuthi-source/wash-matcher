<!DOCTYPE html>
<html>
<head>
    <title>WASH Matcher Results</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; background: #f0f7f4; }
        .container { max-width: 800px; margin: auto; background: white; padding: 30px; border-radius: 10px; }
        h1 { color: #1e6f5c; }
        .match { border-left: 5px solid #1e6f5c; background: #f9fefc; margin: 20px 0; padding: 15px; border-radius: 8px; }
        .score { color: #1e6f5c; font-weight: bold; font-size: 0.9em; }
        .summary { margin-top: 10px; color: #2c3e50; line-height: 1.4; }
        a { color: #1e6f5c; text-decoration: none; font-weight: bold; }
        a:hover { text-decoration: underline; }
    </style>
</head>
<body>
<div class="container">
    <h1>📚 Results for: "{{ query }}"</h1>
    {% if matches %}
        {% for title, score, summary in matches %}
        <div class="match">
            <strong>📄 {{ title }}</strong><br>
            <span class="score">Relevance: {{ "%.2f"|format(score) }}</span>
            <div class="summary">💡 {{ summary }}</div>
        </div>
        {% endfor %}
    {% else %}
        <p>No strong matches found. Try rephrasing your question.</p>
    {% endif %}
    <br>
    <a href="/">← New search</a>
</div>
</body>
</html>
